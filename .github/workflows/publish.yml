name: Publish to npm

# Publishes @deident/core when a version tag (e.g. v0.2.1) is pushed.
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
# Requires an NPM_TOKEN repo secret (npm automation or granular token with
# "bypass 2FA" — a normal token won't work since publishing has 2FA on).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json ($PKG)." >&2
            exit 1
          fi

      # prepublishOnly runs typecheck + tests + build before the actual publish.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
